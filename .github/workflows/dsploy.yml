name: Deploy Vite App

on:
  push:
    branches: [ main ] # Triggers build on pushes to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
       

      - name: Install dependencies
        run: npm ci # Faster, cleaner install for CI environments

      # CRITICAL STEP: Inject the secret explicitly where Vite compiles your code
      - name: Build Project
        run: npm run build
        env:
          VITE_MY_API_KEY: ${{ secrets.VITE_MY_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite builds static assets to the dist folder by default

  # This job handles the physical publishing to GitHub Pages
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
