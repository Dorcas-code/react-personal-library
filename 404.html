<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your App Title</title>
    <script>
      // Single Page Apps for GitHub Pages
      // This script checks to see if a redirect is stored in the sessionStorage,
      // redirects to the correct URL, and then removes it so it's not a loop.
      (function(l) {
        if (l.search[1] === '/' ) {
          var p = l.search.slice(1).split('&').slice(0).join('&').replace(/~and~/g, '&');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + p + l.hash);
        }
      }(window.location));
    </script>
    <!-- Add your Vite scripts and styles below -->
    <script type="module" src="/assets/index.js"></script> 
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
